# Maps Upgrade header to Connection value:
# WebSocket requests → "upgrade", plain HTTP → "" (clears hop-by-hop header)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
}

server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|mp3|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API REST calls to backend — strip /api prefix (matches Vite dev proxy behaviour)
    location /api/ {
        proxy_pass ${BACKEND_URL}/;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Direct backend routes (health + metrics — no /api prefix needed)
    location ~ ^/(health|metrics)$ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy Socket.IO — handles both WebSocket upgrade and long-polling fallback
    location /socket.io/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        # For WebSocket: pass Upgrade header; for long-polling: clear Connection so
        # nginx doesn't send "Connection: close" to the upstream
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Tell backend the original protocol (important behind Render's TLS terminator)
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
